services:
  postgres-order:
    image: postgres:16
    container_name: gopay-postgres-order
    environment:
      POSTGRES_USER: gopay
      POSTGRES_PASSWORD: gopay
      POSTGRES_DB: gopay_order
    ports:
      - "55432:5432"

  postgres-payment:
    image: postgres:16
    container_name: gopay-postgres-payment
    environment:
      POSTGRES_USER: gopay
      POSTGRES_PASSWORD: gopay
      POSTGRES_DB: gopay_payment
    ports:
      - "5433:5432"

  postgres-audit:
    image: postgres:16
    container_name: gopay-postgres-audit
    environment:
      POSTGRES_USER: gopay
      POSTGRES_PASSWORD: gopay
      POSTGRES_DB: gopay_audit
    ports:
      - "5434:5432"

  redis:
    image: redis:7
    container_name: gopay-redis
    ports:
      - "6379:6379"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: gopay-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
